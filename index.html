<!DOCTYPE html>
<html lang='fr'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>BVSBY Secure Seal</title>
<script src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js'></script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'></script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'></script>
<script src='https://unpkg.com/html5-qrcode'></script>
<style>
body{background:#0b0b0d;color:#fff;font-family:Arial;padding:20px}
.wrap{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1200px;margin:auto}
.card{background:#15151b;padding:25px;border-radius:20px;border:1px solid #2b2b35}
input,select,textarea{width:100%;padding:12px;background:#1f1f27;border:1px solid #333;color:#fff;border-radius:10px;margin-top:6px}
button{padding:12px 16px;border:none;border-radius:10px;cursor:pointer;margin-top:10px}
.primary{background:#d4b06a;color:#111}
#seal{position:relative;width:260px;height:260px;margin:auto}
.r1{position:absolute;inset:0;border:4px solid #d4b06a;border-radius:50%}
.r2{position:absolute;inset:12px;border:2px dashed rgba(212,176,106,.5);border-radius:50%}
.logo{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);text-align:center}
.logo h1{font-size:54px;color:#d4b06a;margin:0}
.logo p{font-size:10px;letter-spacing:3px}
#qr{position:absolute;bottom:38px;left:50%;transform:translateX(-50%)}
#reader{margin-top:20px}
#result{margin-top:20px;padding:16px;border-radius:12px;display:none}
.ok{background:rgba(0,255,120,.08);border:1px solid rgba(0,255,120,.2)}
.err{background:rgba(255,0,0,.08);border:1px solid rgba(255,0,0,.2)}
@media(max-width:900px){.wrap{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class='wrap'>
<div class='card'>
<h2>BVSBY Secure Seal</h2>
<p>Cachet intelligent avec QR sécurisé, PNG transparent, PDF et scanner intégré.</p>
<label>Type</label>
<select id='type'>
<option>FACTURE</option>
<option>DEVIS</option>
<option>CONTRAT</option>
</select>
<label>Référence</label>
<input id='ref' placeholder='BV-2026-001'>
<label>Client</label>
<input id='client'>
<label>Montant</label>
<input id='amount'>
<label>Description</label>
<textarea id='desc'></textarea>
<button class='primary' onclick='generateSeal()'>Générer</button>
<button onclick='downloadPNG()'>PNG transparent</button>
<button onclick='downloadPDF()'>PDF</button>
<div id='history'></div>
</div>

<div class='card'>
<div id='seal'>
<div class='r1'></div>
<div class='r2'></div>
<div class='logo'>
<h1>B.V</h1>
<p id='typed'>FACTURE</p>
</div>
<div id='qr'></div>
</div>

<div id='hash'></div>
<button class='primary' onclick='startScanner()'>Scanner QR</button>
<div id='reader'></div>
<div id='result'></div>
</div>
</div>

<script>
const SECRET='BVSBY_2026';

async function sha256(message){
const msgBuffer = new TextEncoder().encode(message);
const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
const hashArray = Array.from(new Uint8Array(hashBuffer));
return hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
}

async function generateSeal(){
const data={
type:type.value,
ref:ref.value || ('BV-'+Date.now()),
client:client.value,
amount:amount.value,
desc:desc.value,
timestamp:new Date().toISOString()
};

const payload=JSON.stringify(data);
const signature=await sha256(payload+SECRET);

const qrData=JSON.stringify({id:data.ref,sig:signature});

localStorage.setItem(data.ref,JSON.stringify({...data,signature}));

typed.innerText=data.type;

qr.innerHTML='';

new QRCode(qr,{
text:qrData,
width:70,
height:70,
colorDark:'#d4b06a',
colorLight:'#0000'
});

hash.innerHTML='<br><small>SHA-256 : '+signature+'</small>';

loadHistory();
}

async function downloadPNG(){
const canvas=await html2canvas(document.getElementById('seal'),{
backgroundColor:null,
scale:4,
removeContainer:true,
allowTaint:true
});

const link=document.createElement('a');
link.download='BVSBY_SEAL.png';
link.href=canvas.toDataURL();
link.click();
}

async function downloadPDF(){
const canvas=await html2canvas(document.getElementById('seal'),{
backgroundColor:null,
scale:4
});

const img=canvas.toDataURL('image/png');
const { jsPDF } = window.jspdf;
const pdf=new jsPDF();
pdf.text('Document certifie BVSBY',20,20);
pdf.addImage(img,'PNG',60,40,90,90);
pdf.save('BVSBY.pdf');
}

function loadHistory(){
history.innerHTML='<h3>Historique</h3>';

Object.keys(localStorage).forEach(k=>{
try{
const d=JSON.parse(localStorage.getItem(k));
if(d.ref){
history.innerHTML+=`<div style="padding:10px;border:1px solid #333;border-radius:10px;margin-top:10px">
<b>${d.ref}</b><br>
<small>${d.client||''}</small>
</div>`;
}
}catch(e){}
});
}

function startScanner(){
const scanner = new Html5Qrcode('reader');

scanner.start(
{ facingMode: 'environment' },
{ fps:10, qrbox:250 },
(txt)=>{
verifyQR(txt);
scanner.stop();
},
()=>{}
);
}

async function verifyQR(raw){
try{
const qrData=JSON.parse(raw);
const stored=JSON.parse(localStorage.getItem(qrData.id));

if(!stored){
result.className='err';
result.style.display='block';
result.innerHTML='Document introuvable';
return;
}

const payload=JSON.stringify({
type:stored.type,
ref:stored.ref,
client:stored.client,
amount:stored.amount,
desc:stored.desc,
timestamp:stored.timestamp
});

const sign=await sha256(payload+SECRET);

if(sign===qrData.sig){
result.className='ok';
result.style.display='block';
result.innerHTML=`
<h3>✓ Authentique</h3>
<p><b>Ref :</b> ${stored.ref}</p>
<p><b>Client :</b> ${stored.client}</p>
<p><b>Montant :</b> ${stored.amount}</p>
`;
}else{
result.className='err';
result.style.display='block';
result.innerHTML='Signature invalide';
}
}catch(e){
result.className='err';
result.style.display='block';
result.innerHTML='QR invalide';
}
}

loadHistory();
</script>
</body>
</html>
